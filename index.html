<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nanoservice - App By Amarmuhammad</title>
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out',
                        'shake': 'shake 0.5s ease-in-out',
                        'float': 'float 4s ease-in-out infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        shake: {
                            '0%, 100%': { transform: 'translateX(0)' },
                            '20%, 60%': { transform: 'translateX(-10px)' },
                            '40%, 80%': { transform: 'translateX(10px)' }
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-15px)' }
                        }
                    }
                }
            }
        }
    </script>

    <!-- Custom Global CSS -->
    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #0F0F0F; font-family: system-ui, -apple-system, sans-serif; }
    </style>

    <!-- Babel Standalone (Untuk menjalankan React langsung di Browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root" class="h-full w-full"></div>

    <!-- SCRIPT UTAMA REACT (ES MODULE) -->
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'https://esm.sh/react@18';
        import { createRoot } from 'https://esm.sh/react-dom@18/client';
        import { 
          Home, Wrench, Wallet, Settings, Smartphone, Users, BarChart3, Mic,
          Search, CheckCircle, Clock, AlertCircle, ChevronRight, LogOut,
          Moon, Sun, Printer, Plus, MessageCircle, Check, Eye, EyeOff,
          Loader2, Lock, User, Fingerprint, MapPin, Receipt, Calendar, ArrowLeft, Download
        } from 'https://esm.sh/lucide-react@0.292.0';

        // URL DATABASE GOOGLE SHEETS KAKAK (Sudah Terhubung)
        const API_URL = 'https://script.google.com/macros/s/AKfycbzc-PiEDN9YM24KIq4B1uv2qirbUwtoTcNxvRO0KhiQOQvid4g0a6qwt9SlHWrjr9vu/exec';

        const App = () => {
          // --- App States ---
          const [appState, setAppState] = useState('splash');
          const [isDarkMode, setIsDarkMode] = useState(true); 
          const [activeTab, setActiveTab] = useState('home'); 
          const [activeSubView, setActiveSubView] = useState(null); 
          const [currentUser, setCurrentUser] = useState(null); 
          
          const [notification, setNotification] = useState(null); 
          const [isPageLoading, setIsPageLoading] = useState(false);
          const [services, setServices] = useState([]);

          const statusFlow = ['Diterima', 'Dicek', 'Sparepart', 'Proses', 'Selesai'];

          // --- HELPER FUNCTIONS ---
          const formatRupiah = (angka) => {
            if (!angka || angka === 0 || angka === '0') return 'Menunggu Konfirmasi';
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);
          };

          // --- SINKRONISASI DATABASE ---
          useEffect(() => {
            if (appState === 'main') {
              setIsPageLoading(true);
              fetch(API_URL)
                .then(res => res.json())
                .then(result => {
                  if (result.success) setServices(result.data);
                  setIsPageLoading(false);
                })
                .catch(err => {
                  console.error('Gagal mengambil data:', err);
                  setIsPageLoading(false);
                  showNotification('Koneksi Gagal', 'Tidak dapat terhubung ke Google Sheets.', 'error');
                });
            }
          }, [appState]);

          const switchTab = (tab, subView = null) => {
            setIsPageLoading(true);
            setTimeout(() => { setActiveTab(tab); setActiveSubView(subView); setIsPageLoading(false); }, 400); 
          };

          const switchAppState = (newState) => {
            setIsPageLoading(true);
            setTimeout(() => { setAppState(newState); setIsPageLoading(false); }, 400);
          };

          const exportToSheet = () => {
            const headers = ['ID Tiket', 'Nama Pelanggan', 'No WhatsApp', 'Merk HP', 'Tipe HP', 'Status', 'Keluhan', 'Diagnosa', 'Harga Servis', 'Modal', 'Profit', 'Teknisi', 'Tanggal Masuk'];
            const csvData = services.map(s => {
              const profit = (parseInt(s.harga) || 0) - (parseInt(s.modal) || 0);
              return [ s.id, `"${s.name}"`, `"${s.phone}"`, `"${s.brand}"`, `"${s.type}"`, s.status, `"${s.issue}"`, `"${s.diagnosis}"`, s.harga || 0, s.modal || 0, profit, s.technician, `"${s.date}"` ].join(',');
            });
            const csvString = [headers.join(','), ...csvData].join('\n');
            const blob = new Blob([csvString], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.setAttribute('download', `Data_Servis_AppByAmarmuhammad_${new Date().toISOString().slice(0, 10)}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showNotification('Download Berhasil', 'Data berhasil diexport.', 'system');
          };

          const printLabelStiker = (service) => {
            const printContent = `
              <html>
                <head>
                  <title>Print Label ${service.id}</title>
                  <style>
                    @page { margin: 0; size: 50mm 30mm; }
                    body { font-family: 'Courier New', Courier, monospace; margin: 0; padding: 4px; font-size: 11px; width: 48mm; color: black; background: white; }
                    .center { text-align: center; }
                    .bold { font-weight: bold; }
                    .id { font-size: 16px; margin-bottom: 2px; }
                    .line { border-top: 1px dashed black; margin: 3px 0; }
                  </style>
                </head>
                <body>
                  <div class="center bold id">${service.id}</div><div class="line"></div>
                  <div class="bold">${service.brand} ${service.type}</div>
                  <div>P: ${service.name}</div><div>K: ${service.issue}</div><div class="line"></div>
                  <div class="center" style="font-size: 9px;">${service.date} - APP BY AMARMUHAMMAD</div>
                </body>
              </html>
            `;
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            document.body.appendChild(iframe);
            iframe.contentWindow.document.open();
            iframe.contentWindow.document.write(printContent);
            iframe.contentWindow.document.close();
            
            setTimeout(() => {
              iframe.contentWindow.focus(); iframe.contentWindow.print();
              setTimeout(() => document.body.removeChild(iframe), 500);
            }, 200);
          };

          const sendWhatsAppMessage = async (phone, message) => {
            const WA_API_TOKEN = 'TOKEN_ANDA_DI_SINI'; 
            if (!phone || phone === '-') return; 
            let formattedPhone = phone.startsWith('0') ? '62' + phone.substring(1) : phone;
            try {
              fetch('https://api.fonnte.com/send', {
                method: 'POST', headers: { 'Authorization': WA_API_TOKEN },
                body: new URLSearchParams({ target: formattedPhone, message: message, delay: '2' }),
              });
            } catch (error) { console.error('Gagal WA:', error); }
          };

          const showNotification = (title, message, type = 'system') => {
            setNotification({ title, message, type });
            setTimeout(() => setNotification(null), 4000);
          };

          const updateDatabaseStatus = (id, newStatus) => {
            fetch(API_URL, {
              method: 'POST', body: JSON.stringify({ action: 'update', payload: { id: id, status: newStatus } })
            }).catch(err => console.error("Gagal sinkron database", err));
          };

          const handleUpdateStatus = (id) => {
            setServices(prev => prev.map(s => {
              if (s.id === id) {
                const currentIndex = statusFlow.indexOf(s.status);
                const nextStatus = currentIndex < statusFlow.length - 1 && currentIndex !== -1 ? statusFlow[currentIndex + 1] : 'Proses';
                
                showNotification('Pesan WA Terkirim', `Update status ${nextStatus} otomatis dikirim ke ${s.name}.`, 'wa');
                sendWhatsAppMessage(s.phone, `Halo *${s.name}*,\nTiket: *${s.id}*\nStatus saat ini: *${nextStatus}*\n*APP BY AMARMUHAMMAD*`);
                updateDatabaseStatus(id, nextStatus);
                return { ...s, status: nextStatus };
              }
              return s;
            }));
          };

          const handleMarkSelesai = (id) => {
            setServices(prev => prev.map(s => {
              if (s.id === id && s.status !== 'Selesai') {
                showNotification('Pesan WA Terkirim', `Pemberitahuan unit selesai telah dikirim ke ${s.name}.`, 'wa');
                sendWhatsAppMessage(s.phone, `Halo *${s.name}*,\nUnit Anda (Tiket: ${s.id}) sudah *SELESAI*.\nTerima kasih!\n*APP BY AMARMUHAMMAD*`);
                updateDatabaseStatus(id, 'Selesai'); 
                return { ...s, status: 'Selesai' };
              }
              return s;
            }));
          };

          // --- SPLASH SCREEN LOGIC ---
          useEffect(() => {
            if (appState === 'splash') {
              const timer = setTimeout(() => switchAppState('login'), 2500);
              return () => clearTimeout(timer);
            }
          }, [appState]);

          const toggleDark = () => setIsDarkMode(!isDarkMode);

          // --- SUB-COMPONENTS ---
          const SplashScreen = () => (
            <div className="h-full w-full bg-[#0F0F0F] flex flex-col items-center justify-center relative overflow-hidden">
              <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 h-64 bg-[#00BFFF]/20 blur-[80px] rounded-full"></div>
              <div className="z-10 flex flex-col items-center animate-fade-in">
                <div className="w-24 h-24 bg-gradient-to-tr from-[#00BFFF] to-[#00FF9F] rounded-full flex items-center justify-center shadow-[0_0_30px_rgba(0,191,255,0.5)] mb-6 animate-[bounce_2s_infinite]">
                  <Wrench size={40} className="text-white" />
                </div>
                <h1 className="text-3xl font-extrabold text-white tracking-widest uppercase">Nanoservice</h1>
                <p className="text-[#00BFFF] text-sm mt-2 font-medium tracking-widest">APP BY AMARMUHAMMAD</p>
              </div>
            </div>
          );

          const LoginScreen = () => {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [showPassword, setShowPassword] = useState(false);
            const [mounted, setMounted] = useState(false);
            const [isLoading, setIsLoading] = useState(false);
            const [isShake, setIsShake] = useState(false);
            const [isSuccess, setIsSuccess] = useState(false);
            const [error, setError] = useState('');

            useEffect(() => {
              const timer = setTimeout(() => setMounted(true), 100);
              return () => clearTimeout(timer);
            }, []);

            const handleLogin = (e) => {
              e.preventDefault();
              if (!password) { triggerError('Kode keamanan tidak boleh kosong!'); return; }
              setIsLoading(true); setError('');

              setTimeout(() => {
                if (password === 'Bymarr2002' || password === 'admin') {
                  setIsSuccess(true); 
                  setTimeout(() => {
                    setCurrentUser({ name: username || 'Admin Amarmuhammad', role: 'admin' });
                    switchAppState('main'); 
                  }, 600);
                } else {
                  triggerError('Akses ditolak! Kode rahasia salah.');
                }
              }, 1500);
            };

            const triggerError = (msg) => {
              setError(msg); setIsShake(true); setIsLoading(false);
              setTimeout(() => setIsShake(false), 500); 
            };

            return (
              <div className="relative h-full w-full overflow-hidden bg-[#0F0F0F] flex flex-col items-center justify-center font-sans">
                <div className="absolute top-[-10%] left-[-20%] w-96 h-96 bg-[#00BFFF] rounded-full mix-blend-screen filter blur-[120px] opacity-30 animate-[pulse_4s_ease-in-out_infinite]"></div>
                <div className="absolute bottom-[-10%] right-[-20%] w-96 h-96 bg-[#00FF9F] rounded-full mix-blend-screen filter blur-[120px] opacity-20 animate-[pulse_5s_ease-in-out_infinite]" style={{ animationDelay: '1s' }}></div>

                <div className={`relative z-10 w-full max-w-[340px] p-8 rounded-[24px] bg-[#2A2A2A]/40 backdrop-blur-xl border border-white/10 shadow-[0_8px_32px_0_rgba(0,191,255,0.15)] transition-all duration-700 flex flex-col items-center
                  ${mounted ? 'translate-y-0 opacity-100' : 'translate-y-12 opacity-0'}
                  ${isSuccess ? 'scale-90 opacity-0' : 'scale-100'} ${isShake ? 'animate-shake' : ''}`}>
                  
                  <div className="animate-float mb-8">
                    <div className="w-20 h-20 rounded-full bg-gradient-to-tr from-[#00BFFF] to-[#00FF9F] p-[2px] shadow-[0_0_25px_rgba(0,191,255,0.5)] hover:scale-110 cursor-pointer transition-transform">
                      <div className="w-full h-full bg-[#0F0F0F] rounded-full flex items-center justify-center">
                        <Wrench size={32} className="text-white" />
                      </div>
                    </div>
                  </div>

                  <div className="text-center w-full mb-8">
                    <h2 className="text-2xl font-extrabold text-white tracking-wide">Nanoservice</h2>
                    <p className="text-[#00BFFF] text-xs font-medium tracking-widest mt-1 uppercase">Premium Access</p>
                  </div>

                  <form onSubmit={handleLogin} className="w-full space-y-4">
                    {error && <div className="p-3 rounded-[12px] bg-red-500/10 border border-red-500/30 text-red-400 text-xs text-center font-bold animate-fade-in">{error}</div>}
                    
                    <div className="relative group">
                      <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><User size={18} className="text-gray-400 group-focus-within:text-[#00BFFF]" /></div>
                      <input type="text" value={username} onChange={(e) => setUsername(e.target.value)} placeholder="Username (Opsional)" className="w-full bg-[#0F0F0F]/60 border border-white/10 text-white placeholder-gray-500 text-sm rounded-[16px] pl-11 pr-4 py-3.5 outline-none focus:border-[#00BFFF] transition-colors" />
                    </div>

                    <div className="relative group">
                      <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><Lock size={18} className="text-gray-400 group-focus-within:text-[#00FF9F]" /></div>
                      <input type={showPassword ? 'text' : 'password'} value={password} onChange={(e) => setPassword(e.target.value)} placeholder="Kode Keamanan" className="w-full bg-[#0F0F0F]/60 border border-white/10 text-white placeholder-gray-500 text-sm rounded-[16px] pl-11 pr-12 py-3.5 outline-none focus:border-[#00FF9F] transition-colors" />
                      <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-white transition-colors">
                        {showPassword ? <EyeOff size={18} /> : <Eye size={18} />}
                      </button>
                    </div>

                    <button type="submit" disabled={isLoading || isSuccess} className="relative w-full py-4 mt-2 rounded-[16px] font-bold text-[#0F0F0F] overflow-hidden hover:scale-[1.02] active:scale-[0.98] shadow-[0_0_20px_rgba(0,191,255,0.4)] hover:shadow-[0_0_30px_rgba(0,255,159,0.6)] group disabled:cursor-not-allowed transition-all duration-300">
                      <div className="absolute inset-0 bg-gradient-to-r from-[#00BFFF] via-[#00FF9F] to-[#00BFFF] bg-[length:200%_auto] animate-[pulse_3s_ease-in-out_infinite] group-hover:bg-[position:right_center] transition-all duration-500"></div>
                      <div className="relative flex items-center justify-center gap-2">
                        {isLoading ? <Loader2 size={20} className="animate-spin text-[#0F0F0F]" /> : isSuccess ? <CheckCircle size={20} className="text-[#0F0F0F]" /> : <>LOGIN SEKARANG <ChevronRight size={18} /></>}
                      </div>
                    </button>
                  </form>

                  <div className="mt-8 pt-6 border-t border-white/10 w-full flex flex-col items-center">
                    <p className="text-xs text-gray-500 mb-4">Atau akses untuk Pelanggan</p>
                    <button onClick={() => switchAppState('customer_tracking')} className="w-full py-3.5 rounded-[16px] font-bold text-white border border-white/20 bg-white/5 hover:bg-white/10 flex justify-center items-center gap-2 transition-all duration-300">
                      <Search size={18} className="text-[#00BFFF]"/> Cek Status Servis
                    </button>
                  </div>
                </div>
              </div>
            );
          };

          const CustomerTrackingScreen = () => {
            const [searchInput, setSearchInput] = useState('');
            const [trackedData, setTrackedData] = useState(null);
            const [isSearching, setIsSearching] = useState(false);

            const handleSearch = async (e) => {
              e?.preventDefault(); 
              if (!searchInput) return;
              setIsSearching(true); setTrackedData(null);
              try {
                const response = await fetch(`${API_URL}?id=${searchInput}`);
                const result = await response.json();
                if (result.success && result.data) setTrackedData(result.data);
                else setTrackedData('not_found');
              } catch (err) {
                console.error("Gagal melacak:", err); setTrackedData('not_found');
              } finally { setIsSearching(false); }
            };

            if (!trackedData || trackedData === 'not_found') {
              return (
                <div className={`relative flex flex-col items-center justify-center h-full w-full p-6 transition-colors duration-500 ${isDarkMode ? 'bg-[#0F0F0F] text-white' : 'bg-gray-50 text-gray-900'}`}>
                  <button onClick={() => switchAppState('login')} className="absolute top-6 left-6 p-2 rounded-full bg-white/5 hover:bg-white/10 transition-colors border border-white/10 text-gray-400 hover:text-white"><ArrowLeft size={20} /></button>
                  
                  <div className="absolute top-6 right-6 flex items-center gap-3">
                    <div className="text-right">
                      <p className="text-[8px] text-gray-500 tracking-widest uppercase mb-0.5">App By</p>
                      <p className="text-[10px] font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-[#00BFFF] to-[#00FF9F] tracking-wider">AMARMUHAMMAD</p>
                    </div>
                    <button onClick={toggleDark} className="p-2 rounded-full bg-white/5 hover:bg-white/10 transition-colors border border-white/10 text-gray-400 hover:text-[#00BFFF]">{isDarkMode ? <Sun size={20} /> : <Moon size={20} />}</button>
                  </div>

                  <div className="w-full max-w-sm flex flex-col items-center animate-fade-in mt-10">
                    <div className="w-20 h-20 bg-gradient-to-tr from-[#00BFFF] to-[#00FF9F] rounded-2xl flex items-center justify-center shadow-[0_10px_30px_rgba(0,191,255,0.3)] mb-6 transform rotate-12">
                      <Smartphone size={36} className="text-white -rotate-12" />
                    </div>
                    <h1 className="text-2xl font-extrabold mb-2 tracking-tight">Cek Status Servis</h1>
                    <p className="text-sm text-gray-500 text-center mb-8">Masukkan No. Tiket atau No. WA Anda untuk melacak perbaikan HP di server.</p>

                    {trackedData === 'not_found' && (
                      <div className="w-full p-4 mb-6 bg-red-500/10 border border-red-500/20 rounded-2xl flex gap-3 animate-shake">
                        <AlertCircle size={20} className="text-red-500 shrink-0 mt-0.5" />
                        <p className="text-sm text-red-500 font-medium">Tiket tidak ditemukan di Server. Pastikan input benar.</p>
                      </div>
                    )}

                    <form onSubmit={handleSearch} className="w-full space-y-4">
                      <input type="text" value={searchInput} onChange={(e) => setSearchInput(e.target.value)} placeholder="Contoh: NS-001 atau 0812..." className={`w-full py-4 px-5 rounded-2xl text-lg font-bold outline-none transition-all ${isDarkMode ? 'bg-[#1A1A1A] border border-white/10 focus:border-[#00BFFF] text-white' : 'bg-white border border-gray-200 focus:border-[#00BFFF] text-gray-900'}`}/>
                      <button type="submit" disabled={isSearching || !searchInput} className="w-full py-4 bg-gradient-to-r from-[#00BFFF] to-[#00FF9F] text-[#0F0F0F] rounded-2xl font-extrabold text-lg shadow-[0_10px_25px_rgba(0,191,255,0.4)] flex justify-center items-center">{isSearching ? <Loader2 className="animate-spin" size={24} /> : 'CARI DI DATABASE'}</button>
                    </form>
                  </div>
                </div>
              );
            }

            const currentStatusIndex = statusFlow.indexOf(trackedData.status);
            const progressPercent = Math.max(0, ((currentStatusIndex + 1) / statusFlow.length) * 100);

            return (
              <div className={`flex justify-center h-full w-full ${isDarkMode ? 'bg-[#0F0F0F] text-white' : 'bg-gray-100 text-gray-900'}`}>
                <div className={`relative w-full max-w-md h-full overflow-hidden flex flex-col ${isDarkMode ? 'bg-[#121212]' : 'bg-gray-50'} sm:border-x sm:border-gray-800 shadow-2xl`}>
                  <div className={`flex items-center gap-3 p-4 border-b sticky top-0 z-20 backdrop-blur-md ${isDarkMode ? 'bg-[#121212]/80 border-gray-800' : 'bg-white/80 border-gray-200'}`}>
                    <button onClick={() => setTrackedData(null)} className={`p-2 rounded-xl transition-colors ${isDarkMode ? 'bg-white/5 text-gray-300' : 'bg-gray-100 text-gray-600'}`}><ArrowLeft size={20}/></button>
                    <div className="flex-1"><h2 className="text-lg font-extrabold tracking-tight">Status Perbaikan</h2></div>
                  </div>
                  <div className="flex-1 overflow-y-auto p-4 pb-24 scrollbar-hide">
                    <div className={`p-5 rounded-[24px] mb-6 relative overflow-hidden shadow-sm ${isDarkMode ? 'bg-[#1A1A1A] border border-white/5' : 'bg-white border border-gray-100'}`}>
                      <div className="absolute top-0 right-0 w-32 h-32 bg-[#00BFFF] rounded-full filter blur-[60px] opacity-10"></div>
                      <div className="flex justify-between items-start mb-4 relative z-10">
                        <div>
                          <div className="flex items-center gap-2 mb-1"><h3 className="text-2xl font-black text-[#00BFFF]">{trackedData.id}</h3><span className={`px-2 py-0.5 rounded-full text-[10px] font-bold uppercase ${trackedData.status === 'Selesai' ? 'bg-[#00FF9F]/20 text-[#00FF9F]' : 'bg-yellow-500/20 text-yellow-500'}`}>{trackedData.status}</span></div>
                          <p className="text-sm font-bold">{trackedData.brand} {trackedData.type}</p>
                        </div>
                      </div>
                      <div className="mt-5 relative z-10">
                        <div className="flex justify-between text-[10px] font-bold text-gray-500 mb-1.5"><span>Progress Perbaikan</span><span className="text-[#00BFFF]">{progressPercent}%</span></div>
                        <div className="h-2 w-full bg-gray-200 dark:bg-gray-800 rounded-full overflow-hidden"><div className="h-full bg-gradient-to-r from-[#00BFFF] to-[#00FF9F] rounded-full" style={{ width: `${progressPercent}%` }}></div></div>
                      </div>
                    </div>
                    
                    <div className={`p-5 rounded-[24px] mb-6 shadow-sm ${isDarkMode ? 'bg-[#1A1A1A] border border-white/5' : 'bg-white border border-gray-100'}`}>
                       <h3 className="text-sm font-bold mb-4 flex items-center gap-2"><Receipt size={16} className="text-[#00FF9F]" /> Detail Perbaikan</h3>
                      <div className="space-y-4">
                        <div className={`p-3 rounded-xl border border-dashed ${isDarkMode ? 'bg-[#00BFFF]/5 border-[#00BFFF]/20' : 'bg-blue-50 border-blue-200'}`}>
                          <p className="text-[10px] text-[#00BFFF] uppercase font-bold tracking-wider mb-1">Diagnosa Teknisi</p>
                          <p className="text-sm font-medium text-[#00BFFF]">{trackedData.diagnosis}</p>
                        </div>
                        <div className="grid grid-cols-2 gap-3 pt-2">

                   activeSubView === 'tracking' ? <SubViewTracking /> :
                   activeSubView === 'laporan' ? <SubViewLaporan /> :
                   activeTab === 'home' ? <TabHome /> :
                   activeTab === 'service' ? <TabService /> :
                   activeTab === 'kasir' ? <TabKasir /> :
                   <TabSetting />
                  }
                </div>

                <div className={`absolute bottom-0 w-full px-4 pb-6 pt-2 bg-gradient-to-t ${isDarkMode ? 'from-[#121212] via-[#121212] to-transparent' : 'from-gray-50 via-gray-50 to-transparent'}`}>
                  <div className={`flex justify-around items-center px-2 py-3 rounded-[24px] shadow-lg backdrop-blur-md ${isDarkMode ? 'bg-gray-900/90 border border-gray-800' : 'bg-white/90 border border-gray-200'}`}>
                    {[
                      { id: 'home', icon: Home, label: 'Home' },
                      { id: 'service', icon: Wrench, label: 'Service' },
                      { id: 'kasir', icon: Wallet, label: 'Kasir' },
                      { id: 'setting', icon: Settings, label: 'Setting' },
                    ].map((item) => (
                      <button key={item.id} onClick={() => switchTab(item.id)} className={`flex flex-col items-center gap-1 w-14 transition-all duration-300 ${activeTab === item.id && !activeSubView ? 'text-[#00BFFF] -translate-y-1' : 'text-gray-500'}`}>
                        <div className={`relative flex items-center justify-center w-10 h-10 rounded-full transition-all ${activeTab === item.id && !activeSubView ? (isDarkMode ? 'bg-[#00BFFF]/20' : 'bg-blue-50') : ''}`}>
                          <item.icon size={20} className={activeTab === item.id && !activeSubView ? "fill-[#00BFFF]/20" : ""} />
                        </div>
                        <span className={`text-[9px] font-medium ${activeTab === item.id && !activeSubView ? 'opacity-100' : 'opacity-0 h-0'}`}>{item.label}</span>
                      </button>
                    ))}
                  </div>
                </div>

              </div>
            </div>
          );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
